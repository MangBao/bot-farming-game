name: Auto Deploy to AWS

# Kích hoạt khi có hành động push/merge vào nhánh master
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kết nối SSH và Cập nhật Code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Di chuyển vào thư mục code
            cd /home/ubuntu/pkm-bot

            # 2. Kéo code mới nhất từ Github về (bỏ qua các thay đổi local rác nếu có)
            git reset --hard
            git pull origin master

            # 3. Kích hoạt môi trường ảo và cài thêm thư viện (nếu có file requirements mới)
            source venv/bin/activate
            pip install -r requirements.txt

            # 4. Khởi động lại Bot để nhận code mới
            sudo systemctl restart vnpet
